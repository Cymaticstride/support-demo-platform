services:
  db:
    image: mysql:8.4
    container_name: support-demo-db
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: support_demo
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p123456"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build: .
    container_name: support-demo-web
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: 123456
      DB_NAME: support_demo
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data: